<!-- Apply saved theme before first paint to avoid flash -->
<script>
  (function() {
    var saved = localStorage.getItem('jtd-theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = saved || (prefersDark ? 'dark' : 'default');
    var link = document.querySelector('link[href*="just-the-docs-"]');
    if (link) link.setAttribute('href', '/cs-path/assets/css/just-the-docs-' + theme + '.css');
  })();
</script>

<!-- Interactive checkboxes: remove disabled, persist state in localStorage -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var storageKey = 'cs-path-progress';
  var saved = JSON.parse(localStorage.getItem(storageKey) || '{}');

  // Build a stable ID for each checkbox from its label text
  function getCheckboxId(cb) {
    var label = cb.parentElement ? cb.parentElement.textContent.trim().substring(0, 80) : '';
    return label.replace(/[^a-zA-Z0-9]/g, '_');
  }

  document.querySelectorAll('.task-list-item-checkbox').forEach(function(cb) {
    cb.removeAttribute('disabled');
    var id = getCheckboxId(cb);
    if (saved[id]) cb.checked = true;
    cb.addEventListener('change', function() {
      var state = JSON.parse(localStorage.getItem(storageKey) || '{}');
      state[id] = cb.checked;
      localStorage.setItem(storageKey, JSON.stringify(state));
    });
  });
});
</script>
