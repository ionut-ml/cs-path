<!-- Apply saved theme before first paint to avoid flash -->
<script>
  (function() {
    var saved = localStorage.getItem('jtd-theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = saved || (prefersDark ? 'dark' : 'default');
    var link = document.querySelector('link[href*="just-the-docs-"]');
    if (link) link.setAttribute('href', '/cs-path/assets/css/just-the-docs-' + theme + '.css');
  })();
</script>
