<style>
  .theme-toggle-wrap {
    padding: 1rem 1rem 0.5rem;
    border-top: 1px solid var(--border-color, #ddd);
    margin-top: 1rem;
  }
  #theme-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: none;
    border: 1px solid var(--border-color, #ccc);
    border-radius: 1.5rem;
    padding: 0.35rem 0.8rem;
    cursor: pointer;
    font-size: 0.85rem;
    width: 100%;
    justify-content: center;
  }
</style>

<div class="theme-toggle-wrap">
  <button id="theme-toggle">🌙 Dark mode</button>
</div>

<script>
(function() {
  var CSS_BASE = '/cs-path/assets/css/just-the-docs-';

  function getLink() {
    return document.querySelector('link[href*="just-the-docs-"]');
  }

  function getCurrentTheme() {
    var link = getLink();
    if (!link) return 'default';
    return link.getAttribute('href').indexOf('-dark.css') !== -1 ? 'dark' : 'default';
  }

  function applyTheme(theme) {
    var link = getLink();
    if (link) link.setAttribute('href', CSS_BASE + theme + '.css');
    localStorage.setItem('jtd-theme', theme);
    var btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = theme === 'dark' ? '☀️ Light mode' : '🌙 Dark mode';
  }

  // Apply saved preference on load
  var saved = localStorage.getItem('jtd-theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved || (prefersDark ? 'dark' : 'default'));

  // Wire up button
  var btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.addEventListener('click', function() {
      applyTheme(getCurrentTheme() === 'dark' ? 'default' : 'dark');
    });
  }
})();
</script>
