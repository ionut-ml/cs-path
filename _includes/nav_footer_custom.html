<style>
  .theme-toggle-wrap {
    padding: 1rem 1rem 0.5rem;
    border-top: 1px solid var(--border-color, #ddd);
    margin-top: 1rem;
  }
  #theme-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: none;
    border: 1px solid var(--border-color, #ccc);
    border-radius: 1.5rem;
    padding: 0.35rem 0.8rem;
    cursor: pointer;
    font-size: 0.85rem;
    width: 100%;
    justify-content: center;
    transition: background 0.2s;
  }
  #theme-toggle:hover {
    background: var(--sidebar-color, rgba(0,0,0,0.05));
  }
</style>

<div class="theme-toggle-wrap">
  <button id="theme-toggle" aria-label="Toggle dark/light mode">
    <span id="theme-icon">🌙</span>
    <span id="theme-label">Dark mode</span>
  </button>
</div>

<script>
  jtd.onReady(function() {
    var btn   = document.getElementById('theme-toggle');
    var icon  = document.getElementById('theme-icon');
    var label = document.getElementById('theme-label');

    function updateButton(theme) {
      icon.textContent  = theme === 'dark' ? '☀️' : '🌙';
      label.textContent = theme === 'dark' ? 'Light mode' : 'Dark mode';
    }

    // Apply saved theme on load (use 'default' for light, 'dark' for dark)
    var saved = localStorage.getItem('jtd-theme');
    if (saved) {
      jtd.setTheme(saved);
      updateButton(saved);
    } else {
      // No saved preference — reflect current state from jtd
      updateButton(jtd.getTheme());
    }

    btn.addEventListener('click', function() {
      var current = jtd.getTheme(); // 'default' or 'dark'
      var next    = current === 'dark' ? 'default' : 'dark';
      jtd.setTheme(next);
      localStorage.setItem('jtd-theme', next);
      updateButton(next);
    });
  });
</script>
