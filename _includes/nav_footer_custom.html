<style>
  .theme-toggle-wrap {
    padding: 1rem 1rem 0.5rem;
    border-top: 1px solid var(--border-color, #ddd);
    margin-top: 1rem;
  }
  #theme-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: none;
    border: 1px solid var(--border-color, #ccc);
    border-radius: 1.5rem;
    padding: 0.35rem 0.8rem;
    cursor: pointer;
    font-size: 0.85rem;
    width: 100%;
    justify-content: center;
  }
</style>

<script>
function csToggleTheme(btn) {
  var l = document.querySelector('link[href*="just-the-docs-"]');
  var isDark = l.href.indexOf('-dark.css') > -1;
  var next = isDark ? 'default' : 'dark';
  l.href = '/cs-path/assets/css/just-the-docs-' + next + '.css';
  localStorage.setItem('jtd-theme', next);
  btn.textContent = next === 'dark' ? '\u2600\uFE0F Light' : '\uD83C\uDF19 Dark';
}
</script>

<div class="theme-toggle-wrap">
  <button id="theme-toggle" onclick="csToggleTheme(this)">🌙 Dark</button>
</div>

<script>
  // Fix label to match current theme on page load
  (function() {
    var l = document.querySelector('link[href*="just-the-docs-"]');
    var btn = document.getElementById('theme-toggle');
    if (l && btn) {
      btn.textContent = l.href.indexOf('-dark.css') > -1 ? '\u2600\uFE0F Light' : '\uD83C\uDF19 Dark';
    }
  })();
</script>
